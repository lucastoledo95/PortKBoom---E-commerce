<!-- Navbar espaçador -->
<div class="bg-zinc-950">
  <div id="nav-anchor" #navAnchor
    class="pointer-events-auto visible bg-zinc-950 opacity-100 transition-opacity duration-300 ease-in-out">
  </div>

  <!-- Navbar fixa -->
  <nav id="headernavbar" #headerNavbar
    class="fixed left-0 top-0 z-10 w-full translate-y-0 border-b border-gray-800/90 bg-zinc-900 transition-transform duration-300 ease-in-out dark:border-gray-600">
    <div class="container mx-auto flex max-w-screen-xl flex-wrap items-center justify-between">
      <a routerLink="/" class="flex p-2 sm:pl-4 sm:gap-4 md:pl-12 md:gap-5">
        <img [src]="logo" class="h-10" alt="PortKBoom Logo">
        <span
          class="whitespace-nowrap text-2xl font-semibold text-neutral-100 block sm:block md:hidden lg:block ">PortKBoom</span>
      </a>
      <div class="flex space-x-1 md:order-2 md:space-x-0 rtl:space-x-reverse">
        <button (click)="theme.toggleTheme()" [class]="buttonThemeClass">
          @if (theme.isDarkMode()) {
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path>
          </svg>
          } @else {
          <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"
              fill-rule="evenodd" clip-rule="evenodd"></path>
          </svg>
          }
        </button>
        <div class="flex items-center md:ms-2">

          <!-- Bloco: Usuário NÃO autenticado -->
          @if (!api.isLoggedIn()) {

          <div class="md:w-38 text-neutral-100 md:text-sm inline-flex">
            <a routerLink="login">
              <div>
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-9">
                  <path fill-rule="evenodd"
                    d="M18.685 19.097A9.723 9.723 0 0 0 21.75 12c0-5.385-4.365-9.75-9.75-9.75S2.25 6.615 2.25 12a9.723 9.723 0 0 0 3.065 7.097A9.716 9.716 0 0 0 12 21.75a9.716 9.716 0 0 0 6.685-2.653Zm-12.54-1.285A7.486 7.486 0 0 1 12 15a7.486 7.486 0 0 1 5.855 2.812A8.224 8.224 0 0 1 12 20.25a8.224 8.224 0 0 1-5.855-2.438ZM15.75 9a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z"
                    clip-rule="evenodd" />
                </svg>
              </div>
            </a>
            <div class="hidden md:block">
              Olá, <a routerLink="login" [class]="authLinkClass" >Entre</a> ou
              <a routerLink="cadastro" [class]="authLinkClass">Cadastre-se</a>


            </div>
          </div>

          }
          <!-- Bloco: Usuário autenticado -->
          @else {
          @if( api.user){
          <div class="relative ms-3">
            <span class="inline-flex rounded-md">


              <button (click)="toggleUserDropdown($event)"
                class="flex items-center rounded-full border-2 border-transparent text-sm transition focus:border-gray-300/30 focus:outline-none">
                <img class="size-10 rounded-full object-cover" [src]="api.user.profile_photo_url" alt="profile_photo" />
                <span
                  class="items-center rounded-md border border-transparent px-3 py-2 text-sm font-medium leading-4 text-gray-400 transition duration-150 ease-in-out hover:text-gray-200  hidden md:inline-flex dark:bg-transparent ">
                 Olá, {{ getFirstName(api.user.name) | titlecase | slice:0:8 }}
                  <svg class="-me-0.5 ms-2 size-4" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                    stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5" />
                  </svg>
                </span>
              </button>

            </span>

            <div id="dropdown" [class.hidden]="!isUserDropdownOpen"
              class=" absolute right-0 mt-2 w-48 rounded-md bg-zinc-800 shadow-lg ring-1 ring-black ring-opacity-5 focus:outline-none z-50">
              <a routerLink="/minha-conta" [class]="dropdownItemClass">Gerenciar Conta</a>
              <a routerLink="/profile" [class]="dropdownItemClass">Perfil</a>
              <a routerLink="/sair" [class]="dropdownItemClass">Sair</a>
            </div>
          </div>
            }
          }


        </div>

        <button #collapseBtn
  (click)="toggleMobileMenu()"
  type="button" 
          class="inline-flex h-10 w-10 items-center justify-center rounded-lg p-2 text-sm font-bold text-gray-200 md:hidden"
          aria-controls="navbar-sticky" aria-expanded="false">
          <span class="sr-only">Abrir menu</span>
          <svg id="hamburger-icon" #hamburgerIcon aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none"
            class="size-4/5" viewBox="0 0 17 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M1 1h15M1 7h15M1 13h15" />
          </svg>
          <svg id="close-icon" #closeIcon xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
            stroke-width="2" class="hidden size-max">
            <path fill-rule="evenodd" clip-rule="evenodd"
              d="M5.47 5.47a.75.75 0 0 1 1.06 0L12 10.94l5.47-5.47a.75.75 0 1 1 1.06 1.06L13.06 12l5.47 5.47a.75.75 0 1 1-1.06 1.06L12 13.06l-5.47 5.47a.75.75 0 0 1-1.06-1.06L10.94 12 5.47 6.53a.75.75 0 0 1 0-1.06Z" />
          </svg>
        </button>
      </div>

      <div class="hidden w-full items-center justify-between md:order-1 md:flex md:w-auto" id="navbar-sticky"
        #navbarSticky>
        <ul
          class="m-1 mt-0.5 flex flex-col rounded-lg border border-gray-700 p-4 font-medium md:mt-0 md:flex-row md:space-x-8 md:border-0 md:bg-zinc-950/20 md:p-0 rtl:space-x-reverse">
          <div class="block md:hidden">
            <div class="flex items-center rounded-sm border-gray-700 px-1 py-2 text-lg text-orange-50">
              <span>Departamentos</span>
            </div>
            <div class="border-t border-gray-600"></div>
          </div>
          <li><a routerLink="/" [class]="linkFullClass">Home</a></li>
          <li><a routerLink="#" [class]="linkFullClass">About</a></li>
          <li><a routerLink="#" [class]="linkFullClass">Services</a></li>
          <li><a routerLink="#" [class]="linkFullClass">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>
</div>
