<!doctype html>
<html lang="en" class="fullscreen-theme">

<head>
  <meta charset="utf-8">
  <title>PortKBoom | Portfólio com API de e-commerce com Angular+TailwindCSS+Laravel+API Sanctum</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline';"> -->
  <link rel="icon" type="image/x-icon" href="https://api.localhost/storage/logos/logo.png">
  <script>
    (() => {
      const theme = localStorage.getItem('theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const useDark = theme === 'dark' || (!theme && prefersDark);
      if (useDark) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <style>
    .initial-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #cbced3;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.3s ease-out;
    }

    .dark .initial-loading {
      background: #111827;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 4px solid #e5e7eb;
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    .dark .loading-spinner {
      border-color: #374151;
      border-top-color: #60a5fa;
    }

    .loading-text {
      margin-top: 16px;
      color: #375484;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 16px;
    }

    .dark .loading-text {
      color: #d1d5db;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }

      100% {
        transform: rotate(360deg);
      }
    }

    .loading-dots {
      display: flex;
      gap: 4px;
      margin-top: 12px;
    }

    .loading-dot {
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out;
    }

    .dark .loading-dot {
      background: #60a5fa;
    }

    .loading-dot:nth-child(1) {
      animation-delay: -0.32s;
    }

    .loading-dot:nth-child(2) {
      animation-delay: -0.16s;
    }

    .loading-dot:nth-child(3) {
      animation-delay: 0s;
    }

    @keyframes bounce {

      0%,
      80%,
      100% {
        transform: scale(0);
      }

      40% {
        transform: scale(1);
      }
    }

    .app-loaded .initial-loading {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>

<body>

  <div id="initial-loading" class="initial-loading">
    <div style="text-align: center;justify-items: center;">
      <div class="loading-dots">
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
        <div class="loading-dot"></div>
      </div>
      <div class="loading-text">Carregando</div>
    </div>
  </div>


  <app-root>
    <div style="text-align: center; padding: 50px; font-family: Arial, sans-serif;">
      <h2>Time out</h2>
      <p>Verifique se o JavaScript está habilitado.</p>
    </div>
  </app-root>



</body>

</html>
